<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VogueAura E-Commerce</title>
    
    <!-- Bagian Kode Logo -->
    <link rel="icon" type="image/png" href="aura-logo.png">
    
    <!-- Mengimpor CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Mengimpor Font Montserrat (Sesuai Desain Figma Premium Anda) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Pembungkus Utama Aplikasi -->
    <div class="app-container">
        
        <!-- Header / Navigation Bar -->
        <header class="navbar">
            <button class="nav-btn" aria-label="Menu">☰</button>
            <h1 class="logo-title">VogueAura</h1>
            <button class="nav-btn" aria-label="Cari">⌕</button>
        </header>

        <!-- Banner Promo Hero -->
        <section class="banner-card">
            <div class="banner-overlay"></div>
            <div class="banner-content">
                <span class="banner-tag">Baru</span>
                <h2>Koleksi Eksklusif</h2>
                <p>Temukan tren fasion premium terbaik Anda hari ini.</p>
            </div>
        </section>

        <!-- Menu Kategori / Filter Singkat -->
        <div class="category-tabs">
            <button class="tab-btn active">POPULER</button>
            <button class="tab-btn">BARU</button>
            <button class="tab-btn">PROMO</button>
        </div>

        <!-- Grid Produk Utama -->
        <main class="product-grid">
            
            <!-- Kartu Produk 1 -->
            <div class="product-card">
                <div class="product-image-container">
                    <img src="baju1.jpg" alt="Gaun Midi Bunga" onerror="this.src='https://via.placeholder.com/300x400?text=Gaun+Midi+Bunga'">
                </div>
                <div class="product-info">
                    <h3 class="product-name">Gaun Midi Bunga</h3>
                    <p class="product-price">Rp 580.000</p>
                </div>
            </div>

            <!-- Kartu Produk 2 -->
            <div class="product-card">
                <div class="product-image-container">
                    <img src="baju2.jpg" alt="Set Blazer Klasik" onerror="this.src='https://via.placeholder.com/300x400?text=Set+Blazer+Klasik'">
                </div>
                <div class="product-info">
                    <h3 class="product-name">Set Blazer Klasik</h3>
                    <p class="product-price">Rp 825.000</p>
                </div>
            </div>

            <!-- Kartu Produk 3 -->
            <div class="product-card">
                <div class="product-image-container">
                    <img src="baju3.jpg" alt="Jaket Kasual Premium" onerror="this.src='https://via.placeholder.com/300x400?text=Jaket+Kasual+Premium'">
                </div>
                <div class="product-info">
                    <h3 class="product-name">Jaket Kasual Premium</h3>
                    <p class="product-price">Rp 650.000</p>
                </div>
            </div>

            <!-- Kartu Produk 4 -->
            <div class="product-card">
                <div class="product-image-container">
                    <img src="baju4.jpg" alt="Celana Denim Santai" onerror="this.src='https://via.placeholder.com/300x400?text=Celana+Denim+Santai'">
                </div>
                <div class="product-info">
                    <h3 class="product-name">Celana Denim Santai</h3>
                    <p class="product-price">Rp 450.000</p>
                </div>
            </div>

        </main>
    </div>

</body>
</html>
